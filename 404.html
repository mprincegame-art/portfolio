  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .error-page::before {
      content: '404';
      position: absolute;
      font-family: 'Syne', sans-serif;
      font-size: clamp(150px, 35vw, 300px);
      font-weight: 800;
      color: rgba(16, 185, 129, 0.04);
      pointer-events: none;
      user-select: none;
      line-height: 1;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .error-inner {
      position: relative;
      z-index: 1;
      max-width: 500px;
    }

    .error-code {
      font-family: 'Space Mono', monospace;
      font-size: clamp(5rem, 15vw, 9rem);
      font-weight: 700;
      color: #10B981;
      line-height: 1;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    .error-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.4s;
    }

    .error-sub {
      font-size: 1rem;
      color: #94A3B8;
      line-height: 1.7;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.6s;
    }

    .error-sub span {
      font-family: 'Space Mono', monospace;
      color: #10B981;
      background: rgba(16, 185, 129, 0.1);
      padding: 2px 8px;
      border-radius: 6px;
    }

    .error-actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.8s;
    }

    .error-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid #10B981;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      position: relative;
      box-shadow: 0 0 40px rgba(16, 185, 129, 0.15);
      opacity: 0;
      animation: fadeIn 0.8s ease forwards 0.1s;
    }

    .error-ring::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px dashed rgba(16, 185, 129, 0.35);
      animation: spin 12s linear infinite;
    }

    .error-ring i {
      font-size: 2.5rem;
      color: #10B981;
    }
  </style>
